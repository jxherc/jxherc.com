<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>guestbook — jxherc</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=19">
<script>const t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;</script>
<meta property="og:title" content="guestbook — jxherc">
<meta property="og:description" content="leave a message">
<meta property="og:image" content="og-image.png">
<meta name="twitter:card" content="summary_large_image">
</head>
<body>
<button class="theme-toggle" id="theme-toggle" aria-label="toggle light mode">◐</button>
<div class="meme-overlay" id="meme-overlay">
  <div class="meme-box">
    <img class="meme-img" src="images/spongebob-eyes.jpg" alt="spongebob my eyes meme" />
    <p class="meme-text">are you absolutely motherfucking sure you wanna switch to light mode</p>
    <button class="meme-confirm" id="meme-confirm">yes i am sure</button>
    <button class="meme-cancel" id="meme-cancel">nevermind</button>
  </div>
</div>

<main>
  <a class="home" href="index.html">jxherc</a>

  <section>
    <div class="label">leave a note</div>
    <form class="gb-form" id="gb-form">
      <div class="gb-field">
        <label class="gb-label" for="gb-name">name</label>
        <input class="gb-input" id="gb-name" type="text" placeholder="your name" maxlength="60" required autocomplete="off">
      </div>
      <div class="gb-field">
        <label class="gb-label" for="gb-message">message</label>
        <textarea class="gb-input gb-textarea" id="gb-message" placeholder="say something" maxlength="500" required></textarea>
      </div>
      <div class="gb-actions">
        <button class="gb-submit" type="submit" id="gb-submit">leave a note →</button>
        <span class="gb-status" id="gb-status"></span>
      </div>
    </form>
  </section>

  <section>
    <div class="label">entries <span class="live-stamp" id="entry-count"></span></div>
    <div id="gb-entries"><div style="color:var(--muted)">loading…</div></div>
  </section>

  <section class="page-edit-stamp" id="edit-stamp">—</section>
</main>

<script>
const API = 'https://api.jxherc.com';

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadEntries() {
  const el = document.getElementById('gb-entries');
  try {
    const res = await fetch(API + '/guestbook');
    const data = await res.json();
    const entries = data.entries || data || [];
    document.getElementById('entry-count').textContent = entries.length + ' total';
    if (!entries.length) { el.innerHTML = '<div style="color:var(--muted)">no entries yet — be the first!</div>'; return; }
    el.innerHTML = entries.map(e => {
      const date = new Date(e.date).toLocaleDateString('en-CA', { month:'short', day:'numeric', year:'numeric' }).toLowerCase();
      return `<div style="padding:0.85rem 0;border-bottom:1px solid var(--faint)">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:1rem;margin-bottom:0.3rem">
          <span style="font-size:0.8rem;font-weight:500">${esc(e.name)}</span>
          <span style="font-size:0.65rem;color:var(--faint);letter-spacing:0.04em;flex-shrink:0">${date}</span>
        </div>
        <div style="font-size:0.85rem;color:var(--muted);line-height:1.55">${esc(e.message)}</div>
      </div>`;
    }).join('');
  } catch { el.innerHTML = '<div style="color:var(--muted)">failed to load entries.</div>'; }
}

document.getElementById('gb-form').addEventListener('submit', async ev => {
  ev.preventDefault();
  const name    = document.getElementById('gb-name').value.trim();
  const message = document.getElementById('gb-message').value.trim();
  const btn     = document.getElementById('gb-submit');
  const status  = document.getElementById('gb-status');

  btn.disabled = true;
  btn.textContent = 'sending…';
  status.textContent = '';

  try {
    const res = await fetch(API + '/guestbook', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, message }),
    });
    if (!res.ok) throw new Error();
    btn.textContent = 'sent!';
    status.textContent = 'pending approval — thanks!';
    document.getElementById('gb-name').value = '';
    document.getElementById('gb-message').value = '';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'leave a note →'; status.textContent = ''; }, 5000);
  } catch {
    status.textContent = 'something went wrong. try again.';
    btn.disabled = false;
    btn.textContent = 'leave a note →';
  }
});

loadEntries();
fetch('https://api.github.com/repos/jxherc/website/commits?path=guestbook.html&per_page=1')
  .then(r=>r.json()).then(data=>{const c=data[0]?.commit;if(!c)return;const d=new Date(c.committer?.date||c.author?.date);if(isNaN(d))return;const date=d.toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}).toLowerCase();const msg=(c.message||'').split('\n')[0].replace(/\s*https?:\/\/\S+/g,'').trim();document.getElementById('edit-stamp').textContent='page last edited '+date+(msg?' · '+msg:'');}).catch(()=>{});
</script>
<script src="theme.js"></script>
</body>
</html>

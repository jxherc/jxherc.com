<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>guestbook — jxherc</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=19">
<script>const t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;</script>
<meta property="og:title" content="guestbook — jxherc">
<meta property="og:description" content="leave a message">
<meta property="og:image" content="og-image.png">
<meta name="twitter:card" content="summary_large_image">
</head>
<body>
<button class="theme-toggle" id="theme-toggle" aria-label="toggle light mode">◐</button>
<div class="meme-overlay" id="meme-overlay">
  <div class="meme-box">
    <img class="meme-img" src="images/spongebob-eyes.jpg" alt="spongebob my eyes meme" />
    <p class="meme-text">are you absolutely motherfucking sure you wanna switch to light mode</p>
    <button class="meme-confirm" id="meme-confirm">yes i am sure</button>
    <button class="meme-cancel" id="meme-cancel">nevermind</button>
  </div>
</div>

<main>
  <a class="home" href="index.html">jxherc</a>

  <section>
    <div class="label">leave a note</div>
    <form class="gb-form" id="gb-form">
      <div class="gb-field">
        <label class="gb-label" for="gb-name">name</label>
        <input class="gb-input" id="gb-name" type="text" placeholder="your name" maxlength="60" required autocomplete="off">
      </div>
      <div class="gb-field">
        <label class="gb-label" for="gb-message">message</label>
        <textarea class="gb-input gb-textarea" id="gb-message" placeholder="say something" maxlength="500" required></textarea>
      </div>
      <div class="gb-actions">
        <button class="gb-submit" type="submit" id="gb-submit">leave a note →</button>
        <span class="gb-status" id="gb-status"></span>
      </div>
    </form>
  </section>

  <section>
    <div class="label">entries <span class="live-stamp" id="entry-count"></span></div>
    <div class="gb-entries" id="gb-entries">
      <div class="gb-loading">loading…</div>
    </div>
  </section>

  <section class="page-edit-stamp">guestbook</section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function loadEntries() {
  const container = document.getElementById('gb-entries');
  const { data, error } = await sb
    .from('guestbook')
    .select('name, message, created_at')
    .eq('approved', true)
    .order('created_at', { ascending: false });

  if (error || !data) {
    container.innerHTML = '<div class="gb-empty">failed to load entries.</div>';
    return;
  }

  const count = document.getElementById('entry-count');
  count.textContent = data.length + ' total';

  if (data.length === 0) {
    container.innerHTML = '<div class="gb-empty">no entries yet — be the first!</div>';
    return;
  }

  container.innerHTML = data.map(e => {
    const d = new Date(e.created_at);
    const date = d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }).toLowerCase();
    return `<div class="gb-entry">
      <div class="gb-entry-header">
        <span class="gb-name">${esc(e.name)}</span>
        <span class="gb-date">${date}</span>
      </div>
      <div class="gb-message">${esc(e.message)}</div>
    </div>`;
  }).join('');
}

document.getElementById('gb-form').addEventListener('submit', async ev => {
  ev.preventDefault();
  const name = document.getElementById('gb-name').value.trim();
  const message = document.getElementById('gb-message').value.trim();
  const btn = document.getElementById('gb-submit');
  const status = document.getElementById('gb-status');

  btn.disabled = true;
  btn.textContent = 'sending…';
  status.textContent = '';

  const { error } = await sb.from('guestbook').insert({ name, message });

  if (error) {
    status.textContent = 'something went wrong. try again.';
    btn.disabled = false;
    btn.textContent = 'leave a note →';
  } else {
    btn.textContent = 'sent!';
    status.textContent = 'pending approval — thanks!';
    document.getElementById('gb-name').value = '';
    document.getElementById('gb-message').value = '';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'leave a note →';
      status.textContent = '';
    }, 5000);
  }
});

loadEntries();
</script>
<script src="theme.js"></script>
</body>
</html>

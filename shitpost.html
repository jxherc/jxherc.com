<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shitpost — jxherc</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=19">
<script>const t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;</script>
<meta property="og:title" content="shitpost — jxherc">
<meta property="og:description" content="shitposts">
<meta property="og:image" content="og-image.png">
<meta name="twitter:card" content="summary_large_image">
<style>
.img-grid { display:grid; gap:3px; margin-top:0.6rem; width:fit-content; }
.img-grid img { display:block; object-fit:cover; cursor:zoom-in; background:#1a1a1a; border-radius:2px; }
.img-grid.n1 { max-width:280px; }
.img-grid.n1 img { width:100%; max-height:280px; object-fit:contain; }
.img-grid.n2 { grid-template-columns:repeat(2,132px); }
.img-grid.n2 img { width:132px; height:132px; }
.img-grid.n3 { grid-template-columns:repeat(3,87px); }
.img-grid.n3 img { width:87px; height:87px; }
.img-grid.n4 { grid-template-columns:repeat(2,132px); }
.img-grid.n4 img { width:132px; height:132px; }
.img-grid.n5,.img-grid.n6,.img-grid.n7,.img-grid.n8,.img-grid.n9 { grid-template-columns:repeat(3,87px); }
.img-grid.n5 img,.img-grid.n6 img,.img-grid.n7 img,.img-grid.n8 img,.img-grid.n9 img { width:87px; height:87px; }
#box { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999; align-items:center; justify-content:center; }
#box.open { display:flex; }
#box img { max-width:92vw; max-height:88vh; object-fit:contain; border-radius:4px; user-select:none; }
#box-close { position:fixed; top:1rem; right:1.2rem; font-size:1.5rem; color:#888; cursor:pointer; line-height:1; background:none; border:none; }
#box-close:hover { color:#fff; }
#box-prev, #box-next { position:fixed; top:50%; transform:translateY(-50%); font-size:1.8rem; color:#888; cursor:pointer; background:none; border:none; padding:0.5rem; user-select:none; }
#box-prev:hover, #box-next:hover { color:#fff; }
#box-prev { left:1rem; }
#box-next { right:1rem; }
#box-count { position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%); font-size:0.72rem; color:#888; letter-spacing:0.06em; }
</style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" aria-label="toggle light mode">◐</button>
<div class="meme-overlay" id="meme-overlay">
  <div class="meme-box">
    <img class="meme-img" src="images/spongebob-eyes.jpg" alt="spongebob my eyes meme" />
    <p class="meme-text">are you absolutely motherfucking sure you wanna switch to light mode</p>
    <button class="meme-confirm" id="meme-confirm">yes i am sure</button>
    <button class="meme-cancel" id="meme-cancel">nevermind</button>
  </div>
</div>
<div id="box">
  <button id="box-close">✕</button>
  <button id="box-prev">‹</button>
  <img id="box-img" src="" alt="" />
  <button id="box-next">›</button>
  <div id="box-count"></div>
</div>
<main>
  <a class="home" href="index.html">jxherc</a>
  <section>
    <div class="label">shitpost</div>
    <div id="feed"><div style="color:var(--muted)">loading…</div></div>
  </section>
  <section class="page-edit-stamp" id="edit-stamp">—</section>
</main>
<script>
const API = 'https://api.jxherc.com';

let pile = [], pick = 0;
const box = document.getElementById('box');
const shot = document.getElementById('box-img');
const tally = document.getElementById('box-count');

function zoom(imgs, i) {
  pile = imgs; pick = i;
  render();
  box.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function render() {
  shot.src = pile[pick];
  tally.textContent = pile.length > 1 ? (pick + 1) + ' / ' + pile.length : '';
}
function shut() {
  box.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('box-close').onclick = shut;
document.getElementById('box-prev').onclick = () => { pick = (pick - 1 + pile.length) % pile.length; render(); };
document.getElementById('box-next').onclick = () => { pick = (pick + 1) % pile.length; render(); };
box.addEventListener('click', e => { if (e.target === box) shut(); });
document.addEventListener('keydown', e => {
  if (!box.classList.contains('open')) return;
  if (e.key === 'Escape') shut();
  if (e.key === 'ArrowLeft') { pick = (pick - 1 + pile.length) % pile.length; render(); }
  if (e.key === 'ArrowRight') { pick = (pick + 1) % pile.length; render(); }
});

function makeGrid(imgs) {
  if (!imgs.length) return '';
  const n = Math.min(imgs.length, 9);
  const shown = imgs.slice(0, n);
  const cells = shown.map((url, i) => '<img src="' + url + '" loading="lazy" alt="" data-idx="' + i + '" />').join('');
  return '<div class="img-grid n' + n + '" data-images=\'' + JSON.stringify(shown) + '\'>' + cells + '</div>';
}

async function getPosts() {
  const feed = document.getElementById('feed');
  try {
    const r = await fetch(API + '/posts');
    const raw = await r.json();
    const posts = raw.posts || raw || [];
    if (!posts.length) { feed.innerHTML = '<div style="color:var(--muted)">no posts yet.</div>'; return; }
    feed.innerHTML = posts.map(p => {
      const when = new Date(p.date).toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric' }).toLowerCase();
      const src = p.via ? '<span style="color:var(--muted);font-size:0.78rem"> · via ' + p.via + '</span>' : '';
      const head = p.title ? '<div style="font-weight:500;margin-bottom:0.2rem">' + p.title + '</div>' : '';
      const body = p.body ? '<div style="white-space:pre-wrap;line-height:1.6">' + p.body + '</div>' : '';
      const imgs = p.images || (p.image ? [p.image] : []);
      const grid = makeGrid(imgs);
      return '<div style="padding:0.85rem 0;border-bottom:1px solid var(--faint)">' + head + body + grid + '<div style="color:var(--muted);font-size:0.78rem;margin-top:0.5rem">' + when + src + '</div></div>';
    }).join('');

    feed.querySelectorAll('.img-grid').forEach(g => {
      const imgs = JSON.parse(g.dataset.images);
      g.querySelectorAll('img').forEach(img => {
        img.addEventListener('click', () => zoom(imgs, +img.dataset.idx));
      });
    });
  } catch { feed.innerHTML = '<div style="color:var(--muted)">failed to load posts.</div>'; }
}
getPosts();

fetch('https://api.github.com/repos/jxherc/website/commits?path=shitpost.html&per_page=1')
  .then(r => r.json())
  .then(data => {
    const hit = data[0]?.commit;
    if (!hit) return;
    const d = new Date(hit.committer?.date || hit.author?.date);
    if (isNaN(d)) return;
    const when = d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }).toLowerCase();
    const why = (hit.message || '').split('\n')[0].replace(/\s*https?:\/\/\S+/g, '').trim();
    document.getElementById('edit-stamp').textContent = 'page last edited ' + when + (why ? ' · ' + why : '');
  })
  .catch(() => {});
</script>
<script src="theme.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>photos — jxherc</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=19">
<script>const t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;</script>
<meta property="og:title" content="photos — jxherc">
<meta property="og:description" content="some photos">
<meta property="og:image" content="og-image.png">
<meta name="twitter:card" content="summary_large_image">
<style>
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:.75rem; margin-top:.5rem; }
.cell { position:relative; aspect-ratio:1; overflow:hidden; border-radius:6px; background:var(--faint); cursor:pointer; }
.cell img { width:100%; height:100%; object-fit:cover; transition:opacity .2s; opacity:0; }
.cell img.in { opacity:1; }
.cell .cap { position:absolute; bottom:0; left:0; right:0; padding:.5rem .6rem; background:linear-gradient(transparent,rgba(0,0,0,.55)); color:#fff; font-size:.75rem; opacity:0; transition:opacity .15s; }
.cell:hover .cap { opacity:1; }
#box { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:999; align-items:center; justify-content:center; cursor:zoom-out; }
#box.open { display:flex; }
#box img { max-width:92vw; max-height:92vh; object-fit:contain; border-radius:4px; }
</style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" aria-label="toggle light mode">◐</button>
<div class="meme-overlay" id="meme-overlay">
  <div class="meme-box">
    <img class="meme-img" src="images/spongebob-eyes.jpg" alt="spongebob my eyes meme" />
    <p class="meme-text">are you absolutely motherfucking sure you wanna switch to light mode</p>
    <button class="meme-confirm" id="meme-confirm">yes i am sure</button>
    <button class="meme-cancel" id="meme-cancel">nevermind</button>
  </div>
</div>
<div id="box"><img id="box-img" src="" alt=""></div>
<main>
  <a class="home" href="index.html">jxherc</a>
  <section>
    <div class="label">photos</div>
    <div id="shell"><div style="color:var(--muted)">loading…</div></div>
  </section>
  <section class="page-edit-stamp" id="edit-stamp">—</section>
</main>
<script>
const API = 'https://api.jxherc.com';

async function load() {
  const shell = document.getElementById('shell');
  try {
    const r = await fetch(API + '/photos');
    const raw = await r.json();
    const shots = raw.photos || raw || [];
    if (!shots.length) { shell.innerHTML = '<div style="color:var(--muted)">no photos yet.</div>'; return; }

    const g = document.createElement('div');
    g.className = 'grid';
    g.innerHTML = shots.map(p => {
      const src = (p.url || '').startsWith('http') ? p.url : API + (p.url || '');
      const date = p.exif?.takenAt ? new Date(p.exif.takenAt).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }).toLowerCase() : '';
      const cam = p.exif?.device || '';
      const meta = [date, cam].filter(Boolean).join(' · ');
      return '<div class="cell" data-src="' + src + '">'
        + '<img src="' + src + '" alt="' + (p.caption || '') + '" loading="lazy" onload="this.classList.add(\'in\')" onerror="this.parentElement.style.display=\'none\'">'
        + (meta ? '<div class="cap">' + meta + '</div>' : '')
        + '</div>';
    }).join('');

    shell.innerHTML = '';
    shell.appendChild(g);

    const box = document.getElementById('box');
    const big = document.getElementById('box-img');
    g.querySelectorAll('.cell').forEach(cell => {
      cell.addEventListener('click', () => { big.src = cell.dataset.src; box.classList.add('open'); });
    });
    box.addEventListener('click', () => box.classList.remove('open'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') box.classList.remove('open'); });
  } catch {
    shell.innerHTML = '<div style="color:var(--muted)">failed to load photos.</div>';
  }
}
load();

fetch('https://api.github.com/repos/jxherc/website/commits?path=photos.html&per_page=1')
  .then(r => r.json())
  .then(data => {
    const hit = data[0]?.commit;
    if (!hit) return;
    const d = new Date(hit.committer?.date || hit.author?.date);
    if (isNaN(d)) return;
    const when = d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }).toLowerCase();
    const why = (hit.message || '').split('\n')[0].replace(/\s*https?:\/\/\S+/g, '').trim();
    document.getElementById('edit-stamp').textContent = 'page last edited ' + when + (why ? ' · ' + why : '');
  })
  .catch(() => {});
</script>
<script src="theme.js"></script>
</body>
</html>

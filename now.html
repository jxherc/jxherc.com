<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>now — jxherc</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=19">
<script>const t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;</script>
<meta property="og:title" content="now — jxherc">
<meta property="og:description" content="what i'm up to">
<meta property="og:image" content="og-image.png">
<meta name="twitter:card" content="summary_large_image">
</head>
<body>
<button class="theme-toggle" id="theme-toggle" aria-label="toggle light mode">◐</button>
<div class="meme-overlay" id="meme-overlay">
  <div class="meme-box">
    <img class="meme-img" src="images/spongebob-eyes.jpg" alt="spongebob my eyes meme" />
    <p class="meme-text">are you absolutely motherfucking sure you wanna switch to light mode</p>
    <button class="meme-confirm" id="meme-confirm">yes i am sure</button>
    <button class="meme-cancel" id="meme-cancel">nevermind</button>
  </div>
</div>
<main>
  <a class="home" href="index.html">jxherc</a>
  <section>
    <div class="label">now</div>
    <div class="kv-list">
      <div class="kv-row"><span class="k">working on</span><span class="v" style="color:var(--muted)" id="doing">loading…</span></div>
      <div class="kv-row"><span class="k">vibe</span><span class="v" style="color:var(--muted)" id="mood">—</span></div>
      <div class="kv-row"><span class="k">updated</span><span class="v" style="color:var(--muted)" id="when">—</span></div>
    </div>
  </section>
  <section class="page-edit-stamp" id="edit-stamp">—</section>
</main>
<script>
const API = 'https://api.jxherc.com';

async function load() {
  try {
    const r = await fetch(API + '/status');
    if (!r.ok) throw 0;
    const raw = await r.json();
    const s = raw.status || raw;
    document.getElementById('doing').textContent = s.workingOn || '—';
    document.getElementById('mood').textContent = s.vibe || '—';
    if (s.updatedAt) {
      const mins = Math.round((Date.now() - new Date(s.updatedAt)) / 60000);
      const ago = mins < 1    ? 'just now'
        : mins < 60           ? mins + 'm ago'
        : mins < 1440         ? Math.round(mins / 60) + 'h ago'
        : Math.round(mins / 1440) + 'd ago';
      document.getElementById('when').textContent = ago;
    }
  } catch {
    document.getElementById('doing').textContent = 'failed to load.';
  }
}
load();

fetch('https://api.github.com/repos/jxherc/website/commits?path=now.html&per_page=1')
  .then(r => r.json())
  .then(data => {
    const hit = data[0]?.commit;
    if (!hit) return;
    const d = new Date(hit.committer?.date || hit.author?.date);
    if (isNaN(d)) return;
    const when = d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }).toLowerCase();
    const why = (hit.message || '').split('\n')[0].replace(/\s*https?:\/\/\S+/g, '').trim();
    document.getElementById('edit-stamp').textContent = 'page last edited ' + when + (why ? ' · ' + why : '');
  })
  .catch(() => {});
</script>
<script src="theme.js"></script>
</body>
</html>
